name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only; do not create GitHub Release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run linters
        run: just check

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        if: ${{ !inputs.dry_run }}
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Bump VERSION before releasing."
            exit 1
          fi

      - name: Verify signing secrets are present
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          missing=()
          [ -z "$RELEASE_KEYSTORE_BASE64" ] && missing+=("RELEASE_KEYSTORE_BASE64")
          [ -z "$RELEASE_KEYSTORE_PASSWORD" ] && missing+=("RELEASE_KEYSTORE_PASSWORD")
          [ -z "$RELEASE_KEY_ALIAS" ] && missing+=("RELEASE_KEY_ALIAS")
          [ -z "$RELEASE_KEY_PASSWORD" ] && missing+=("RELEASE_KEY_PASSWORD")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing required secrets: ${missing[*]}"
            echo "Register them in Settings -> Secrets and variables -> Actions (see README)."
            exit 1
          fi
          echo "All 4 signing secrets are present."

      - name: Decode keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "Keystore written to $RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: just build-release

      - name: Rename APK with version
        id: apk
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          SRC="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$SRC" ]; then
            echo "Signed APK not found at $SRC. Check signingConfigs.release and secrets."
            exit 1
          fi
          DEST="taiju-${TAG}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}

      - name: Upload APK as workflow artifact (dry_run)
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: taiju-${{ steps.version.outputs.tag }}
          path: ${{ steps.apk.outputs.path }}
